<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Inscripción</title>
    <style>
        body {
            margin: 0;
            background: #020617; /* Fondo oscuro consistente */
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ESCANEO LÁSER ROJO DE FONDO - OPACIDAD REDUCIDA */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 2px,
                rgba(255, 77, 77, 0.015) 3px /* Opacidad sumamente baja (1.5%) */
            );
            animation: moveLines 15s linear infinite; /* Animación más lenta para ser menos notable */
            pointer-events: none;
            z-index: 0;
        }

        @keyframes moveLines {
            from { transform: translateY(0); }
            to { transform: translateY(100px); }
        }

        /* ANIMACIÓN DE ENTRADA */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-container {
            background: rgba(30, 41, 59, 0.6); /* Ligeramente más opaco para mejor lectura */
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 380px;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.15); /* Brillo de sombra reducido */
            border: 1px solid rgba(255, 77, 77, 0.15); /* Borde reducido */
            margin-bottom: 20px;
            position: relative;
            z-index: 5;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .btn-back {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 25px;
            color: #ff4d4d; /* ROJO */
            text-decoration: none;
            border: 1px solid #ff4d4d;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
            background: transparent;
            position: relative;
            z-index: 5;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
        }

        .field {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5f5;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #ff4d4d; /* ROJO EN FOCUS */
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.3);
        }

        .btn-inscribir {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: #ff4d4d; /* BOTÓN ROJO */
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-inscribir:hover {
            background: #fff;
            color: #020617;
            box-shadow: 0 0 15px #ff4d4d;
            transform: scale(1.02);
        }

        .btn-back:hover {
            background: #ff4d4d;
            color: #0f172a;
            box-shadow: 0 0 15px #ff4d4d;
        }
    </style>
</head>
<body>

<div class="form-container">
    <form id="registroForm">
        <div class="field">
            <label>Nombre completo</label>
            <input type="text" id="nombre" placeholder="Ingresa tu nombre" required>
        </div>

        <div class="field">
            <label>Correo electrónico</label>
            <input type="email" id="correo" placeholder="ejemplo@gmail.com" required>
        </div>

        <div class="field">
            <label>Teléfono</label>
            <input type="text" id="telefono" placeholder="809-000-0000" required>
        </div>

        <div class="field">
            <label>Curso / Grado</label>
            <select id="curso">
                <option value="">Selecciona</option>
                <option value="1ro">1ro Secundaria</option>
                <option value="2do">2do Secundaria</option>
                <option value="3ro">3ro Secundaria</option>
                <option value="4to">4to Secundaria</option>
                <option value="5to">5to Secundaria</option>
                <option value="6to">6to Secundaria</option>
            </select>
        </div>

        <div class="field">
            <label>Área interesada</label>
            <select id="area">
                <option value="">Selecciona</option>
                <option value="Informatica">Informática</option>
                <option value="Contabilidad">Contabilidad</option>
                <option value="Enfermeria">Enfermeria</option>
            </select>
        </div>

        <div class="field">
            <label>Calle</label>
            <input type="text" id="calle" placeholder="Ej: Calle 5, Cristo Rey" required>
        </div>

        <button type="button" class="btn-inscribir" onclick="generarArchivo()">Inscribirme</button>
    </form>
</div>

<a href="Index.html" class="btn-back">REGRESAR A LA PAGINA PRINCIPAL</a>

<script>
    function generarArchivo() {
        const nombre = document.getElementById('nombre').value;
        const correo = document.getElementById('correo').value;
        const telefono = document.getElementById('telefono').value;
        const curso = document.getElementById('curso').value;
        const area = document.getElementById('area').value;
        const calle = document.getElementById('calle').value;

        if (!nombre || !correo || !telefono || !curso || !area || !calle) {
            alert("Por favor, completa todos los campos del formulario.");
            return;
        }

        const contenido = `
NUEVA INSCRIPCION...
Fecha: ${new Date().toLocaleString()}

Nombre: ${nombre}

Correo: ${correo}

Teléfono: ${telefono}

Curso: ${curso}

Área: ${area}

Calle: ${calle}

`;

        const blob = new Blob([contenido], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = window.URL.createObjectURL(blob);
        a.download = `Inscripcion_${nombre.replace(/ /g, "_")}.txt`;
        a.click();
        
        alert("¡Registro completado! El archivo se ha generado.");
    }
</script>

</body>
</html>
