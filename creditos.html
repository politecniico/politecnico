<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créditos de los desarrolladores</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --ciano: #ff4d4d; /* CAMBIADO A ROJO */
            --oscuro: #020617;
        }

        body {
            margin: 0;
            background-color: var(--oscuro);
            font-family: 'Share Tech Mono', monospace;
            color: white;
            height: 100vh;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* FONDO DE PARTÍCULAS */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* LÍNEAS DE ESCANEO ROJAS */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 2px,
                rgba(255, 77, 77, 0.05) 3px
            );
            z-index: 10;
            pointer-events: none;
        }

        /* CONTENEDOR DE CRÉDITOS */
        .credits-container {
            position: absolute;
            bottom: -100%; 
            text-align: center;
            width: 100%;
            z-index: 5;
            animation: scrollCredits 25s linear infinite; 
        }

        @keyframes scrollCredits {
            0% { transform: translateY(0); }
            100% { transform: translateY(-300%); } 
        }

        .role {
            color: var(--ciano);
            font-size: 1.2rem;
            margin-top: 50px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--ciano);
        }

        .name {
            font-size: 2.5rem;
            margin: 10px 0 40px 0;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .logo-credits {
            width: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px var(--ciano));
        }

        /* BOTÓN VOLVER */
        .btn-back-fixed {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 20;
            padding: 10px 20px;
            background: transparent;
            color: var(--ciano);
            border: 1px solid var(--ciano);
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-back-fixed:hover {
            background: var(--ciano);
            color: var(--oscuro);
            box-shadow: 0 0 20px var(--ciano);
        }

    </style>
</head>
<body>
